name: Remote Update Shared Repo

on:
  workflow_dispatch: # Bisa dijalankan manual lewat tombol di tab Actions
  schedule:
    - cron: '0 0 1 * *' # Berjalan otomatis setiap tanggal 1 setiap bulannya

jobs:
  # JOB 1: Download the database and FORCE PUSH to the shared repo
  push-to-shared:
    runs-on: ubuntu-latest
    steps:
      - name: Download latest database
        run: |
          curl -L -o anime-offline-database-minified.json "https://github.com/manami-project/anime-offline-database/releases/latest/download/anime-offline-database-minified.json"

      - name: Deploy to Shared Repo
        run: |
          # 1. Set bot identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 2. Setup clean folder
          mkdir shared-upload
          mv anime-offline-database-minified.json shared-upload/
          cd shared-upload
          
          # 3. Create clean git history
          git init
          git checkout -b main
          git add anime-offline-database-minified.json
          git commit -m "Auto-update database: $(date +%F)"
          
          # 4. TRICK: Embed the token DIRECTLY into the URL so Git has permission to push!
          git remote add origin https://x-access-token:${{ secrets.SUBMODULE_UPDATE_TOKEN }}@github.com/nagamuslim/shared.git
          
          # 5. Force push
          git push --force origin main
