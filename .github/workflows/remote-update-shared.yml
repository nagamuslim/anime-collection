name: Remote Update Shared Repo

on:
  workflow_dispatch: # Bisa dijalankan manual lewat tombol di tab Actions
  schedule:
    - cron: '0 0 1 * *' # Berjalan otomatis setiap tanggal 1 setiap bulannya

jobs:
  # JOB 1: Download the database and FORCE PUSH to the shared repo
  push-to-shared:
    runs-on: ubuntu-latest
    steps:
      - name: Download latest database
        run: |
          curl -L -o anime-offline-database-minified.json "https://github.com/manami-project/anime-offline-database/releases/latest/download/anime-offline-database-minified.json"

      - name: Deploy to Shared Repo
        run: |
          # 1. Set bot identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 2. Setup clean folder
          mkdir shared-upload
          mv anime-offline-database-minified.json shared-upload/
          cd shared-upload
          
          # 3. Create clean git history
          git init
          git checkout -b main
          git add anime-offline-database-minified.json
          git commit -m "Auto-update database: $(date +%F)"
          
          # 4. TRICK: Embed the token DIRECTLY into the URL so Git has permission to push!
          git remote add origin https://x-access-token:${{ secrets.SUBMODULE_UPDATE_TOKEN }}@github.com/nagamuslim/shared.git
          
          # 5. Force push
          git push --force origin main

  # JOB 2: Check, Add, and Sync the Submodule
  sync-submodule:
    needs: push-to-shared # Waits for Job 1 to finish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          submodules: true
          # Use PAT to allow triggering subsequent workflows (like trigger-deploy.yml)
          token: ${{ secrets.SUBMODULE_UPDATE_TOKEN }}

      - name: Ensure Submodule Exists and Update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Changed to just 'db'
          SUB_DIR="db"
          SUB_URL="https://github.com/nagamuslim/shared.git"
          
          # Check if .gitmodules exists AND contains our submodule path
          if ! grep -q "path = $SUB_DIR" .gitmodules 2>/dev/null; then
            echo "Submodule not found in .gitmodules. Adding it now..."
            git submodule add --force "$SUB_URL" "$SUB_DIR"
          else
            echo "Submodule already exists. Updating to latest commit..."
            git submodule update --init --remote --force "$SUB_DIR"
          fi
          
          # Commit the changes if there are any
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes found. Submodule already up to date."
          else
            git add .gitmodules "$SUB_DIR"
            git commit -m "Auto-sync: attach latest database to db/ folder"
            git push origin main
          fi
