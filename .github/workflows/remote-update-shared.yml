name: Remote Update Shared Repo

on:
  workflow_dispatch: # Bisa dijalankan manual lewat tombol di tab Actions
  schedule:
    - cron: '0 0 1 * *' # Berjalan otomatis setiap tanggal 1 setiap bulannya

jobs:
  push-to-shared:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download latest database
        run: |
          # 1. Cari URL download untuk versi minified dari rilis terbaru Manami Project
          LATEST_URL=$(curl -s https://api.github.com/repos/manami-project/anime-offline-database/releases/latest \
            | grep "browser_download_url.*anime-offline-database-minified.json" \
            | cut -d '"' -f 4)
          
          echo "Mendownload database dari: $LATEST_URL"
          
          # 2. Download file JSON-nya
          curl -L -o anime-offline-database-minified.json "$LATEST_URL"

      - name: Deploy to Shared Repo
        env:
          # Gunakan PAT lama milikmu (tidak perlu buat baru)
          GH_TOKEN: ${{ secrets.SUBMODULE_UPDATE_TOKEN }}
        run: |
          # 3. Set identitas akun sebagai bot resmi GitHub Actions
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 4. Biarkan GitHub CLI (gh) mengatur autentikasinya secara otomatis pakai GH_TOKEN
          gh auth setup-git
          
          # 5. Buat folder baru yang benar-benar bersih agar riwayat git lama tidak ikut
          mkdir shared-upload
          mv anime-offline-database-minified.json shared-upload/
          cd shared-upload
          
          # 6. Inisialisasi Git dari nol (sehingga repo ini hanya akan punya 1 commit)
          git init
          git checkout -b main
          git add anime-offline-database-minified.json
          git commit -m "Auto-update database: $(date +%F)"
          
          # 7. Tambahkan URL repo 'shared' milikmu
          git remote add origin https://github.com/nagamuslim/shared.git
          
          # 8. Force push! (Menimpa file lama dan menghapus riwayat agar ukuran repo tetap kecil)
          git push --force origin main


  # JOB 2: Check, Add, and Sync the Submodule & Symlink
  sync-submodule:
    needs: push-to-shared # Waits for Job 1 to finish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure Submodule Exists and Update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 1. The submodule folder (cannot be '.')
          SUB_DIR="shared_db"
          SUB_URL="https://github.com/nagamuslim/shared.git"
          FILE_NAME="anime-offline-database-minified.json"
          
          # Check if .gitmodules exists AND contains our submodule path
          if ! grep -q "path = $SUB_DIR" .gitmodules 2>/dev/null; then
            echo "Submodule not found in .gitmodules. Adding it now..."
            git submodule add --force "$SUB_URL" "$SUB_DIR"
          else
            echo "Submodule already exists. Updating to latest commit..."
            git submodule update --init --remote --force "$SUB_DIR"
          fi
          
          # 2. CREATE SYMLINK TRICK FOR metadata.js
          # If the physical 40MB file exists from an old manual upload, delete it first
          if [ -f "$FILE_NAME" ] && [ ! -L "$FILE_NAME" ]; then
            rm -f "$FILE_NAME"
          fi
          
          # Create a root symlink pointing inside the submodule folder
          if [ ! -L "$FILE_NAME" ]; then
            ln -s "$SUB_DIR/$FILE_NAME" "$FILE_NAME"
            git add "$FILE_NAME"
          fi
          
          # 3. Commit the changes if there are any
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes found. Submodule already up to date."
          else
            git add .gitmodules "$SUB_DIR" "$FILE_NAME"
            git commit -m "Auto-sync: attach latest database and root symlink"
            git push origin main
          fi
