name: Trigger Website Sync

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger nagamuslim.github.io sync
        env:
          GH_TOKEN: ${{ secrets.SUBMODULE_UPDATE_TOKEN }}
        run: |
          gh workflow run sync-submodule.yml --repo nagamuslim/nagamuslim.github.io --ref main
