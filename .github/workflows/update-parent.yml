name: Update Submodule in Parent

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout parent repo
        uses: actions/checkout@v4
        with:
          repository: nagamuslim/nagamuslim.github.io
          token: ${{ secrets.SUBMODULE_UPDATE_TOKEN }}
          submodules: true
          path: parent-repo

      - name: Update submodule
        run: |
          cd parent-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Update the submodule reference to the latest commit
          git submodule update --remote project/anime-collection
          
          # Check if there are changes to commit
          if git diff --quiet; then
            echo "No changes to commit (submodule already up to date)"
          else
            git add project/anime-collection
            git commit -m "Auto-update anime-collection submodule to latest"
            git push origin main
          fi
