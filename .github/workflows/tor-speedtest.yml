name: Tor ID Exit Node Speedtest

on:
  workflow_dispatch:

jobs:
  tor_speedtest:
    runs-on: ubuntu-latest

    steps:
      - name: Install Tor and Speedtest-CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y tor speedtest-cli curl jq

      - name: Configure Tor
        run: |
          echo "ExitNodes {id}" | sudo tee -a /etc/tor/torrc
          echo "StrictNodes 0" | sudo tee -a /etc/tor/torrc
          sudo systemctl restart tor
          
          echo "Waiting 60 seconds for Tor to initialize..."
          for i in {1..6}; do
            echo "Checking Tor status... ($((i*10))s)"
            if curl -s --socks5-hostname 127.0.0.1:9050 https://check.torproject.org/ | grep -q "Congratulations"; then
              echo "Tor is ready!"
              break
            fi
            sleep 10
          done

      - name: Run Speedtest through Tor
        run: |
          echo "Starting speedtest via Tor SOCKS proxy..."
          # Speedtest-cli doesn't support SOCKS5 directly, so we use proxychains
          sudo apt-get install -y proxychains4
          # Configure proxychains to use Tor
          sudo sed -i 's/socks4 \t127.0.0.1 9050/socks5 \t127.0.0.1 9050/' /etc/proxychains4.conf
          
          proxychains4 speedtest-cli --simple --secure || echo "Speedtest failed, attempting with torsocks fallback..."
          torsocks speedtest-cli --simple --secure
