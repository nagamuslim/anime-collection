name: Trigger Parent Sync

on:
  push:
    branches:
      - main

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Parent Repo
        run: |
          curl -X POST 
          -H "Authorization: token ${{ secrets.SUBMODULE_UPDATE_TOKEN }}" 
          -H "Accept: application/vnd.github.v3+json" 
          https://api.github.com/repos/nagamuslim/nagamuslim.github.io/dispatches 
          -d '{"event_type": "submodule_updated"}'
