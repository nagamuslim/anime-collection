<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .header {
            background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
            padding: 15px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: sticky; top: 0; z-index: 100;
        }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 16px; }
        .back-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 10px 18px; border-radius: 8px;
            text-decoration: none; font-weight: 600; transition: all 0.3s ease;
            white-space: nowrap;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); transform: translateX(-3px); }
        .anime-title { font-size: 1.4em; font-weight: 600; color: white; flex: 1; }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .player-section { display: grid; grid-template-columns: 1fr 360px; gap: 20px; }

        .video-container {
            background: rgba(0,0,0,0.5); border-radius: 12px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
        }
        .video-wrapper {
            position: relative; width: 100%; padding-bottom: 56.25%;
            height: 0; overflow: hidden; background: #000;
        }
        .video-wrapper iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }
        .video-info { padding: 18px 20px; }
        .current-episode { font-size: 1.2em; font-weight: 600; color: white; margin-bottom: 6px; }
        .episode-meta { color: #b0b0b0; font-size: 0.9em; }

        .navigation { display: flex; gap: 12px; margin-top: 16px; }
        .nav-btn {
            flex: 1; padding: 14px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; border-radius: 8px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 0.95em;
        }
        .nav-btn:hover:not(:disabled) { background: rgba(102,126,234,0.3); border-color: rgba(102,126,234,0.5); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .episodes-sidebar {
            background: rgba(255,255,255,0.05); border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; display: flex; flex-direction: column;
            max-height: 680px;
        }
        .sidebar-header {
            padding: 16px 18px; background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
        }
        .sidebar-title { font-size: 1em; font-weight: 600; color: white; }

        .sort-toggle { display: flex; gap: 6px; }
        .sort-btn {
            padding: 5px 12px; border-radius: 6px; font-size: 0.8em; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.06); color: #ccc; cursor: pointer;
            transition: all 0.2s ease;
        }
        .sort-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; color: white; }
        .sort-btn:hover:not(.active) { background: rgba(255,255,255,0.12); }

        .episodes-list { overflow-y: auto; flex: 1; padding: 10px; }
        .episode-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 13px 15px;
            margin-bottom: 8px; cursor: pointer;
            transition: all 0.25s ease;
            display: flex; align-items: center; gap: 14px;
        }
        .episode-item:hover { background: rgba(255,255,255,0.1); border-color: rgba(102,126,234,0.4); transform: translateX(4px); }
        .episode-item.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; }
        .ep-num {
            background: rgba(0,0,0,0.3); padding: 7px 10px; border-radius: 6px;
            font-weight: 700; min-width: 46px; text-align: center; font-size: 0.9em;
        }
        .episode-item.active .ep-num { background: rgba(255,255,255,0.2); }
        .ep-title { font-size: 0.9em; font-weight: 500; color: white; line-height: 1.3; }

        .loading { text-align: center; padding: 60px; color: #b0b0b0; font-size: 1.2em; }
        .episodes-list::-webkit-scrollbar { width: 6px; }
        .episodes-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
        .episodes-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        .episodes-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        @media (max-width: 1024px) {
            .player-section { grid-template-columns: 1fr; }
            .episodes-sidebar { max-height: 420px; }
        }
        @media (max-width: 768px) {
            .header-content { flex-direction: column; align-items: flex-start; }
            .navigation { flex-direction: column; }
            .anime-title { font-size: 1.1em; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <a href="index.html" class="back-btn">&#8592; Kembali</a>
            <div class="anime-title" id="animeTitle">Loading...</div>
        </div>
    </div>
    <div class="container">
        <div id="content"><div class="loading">&#9203; Memuat anime...</div></div>
    </div>

    <!--
        bookmark.js MUST be synchronous (no defer) so BookmarkManager
        exists before the inline script's first synchronous execution.
    -->
    <script src="bookmark.js" onerror="void 0"></script>
    <script>
        'use strict';

        // ── State ─────────────────────────────────────────────────────────────
        let currentAnime   = null;
        let ytPlayer       = null;  // YT.Player instance — kept alive across episodes
        let ytApiReady     = false;
        let isInitialLoad  = true;
        let loadedVideoId  = null;  // video_id currently loaded in the YT player

        let currentEpNumber = null;
        let sortOrder       = 'asc';
        let _timeObserver   = null;  // unified marathon-transition + near-end observer

        // ── Helpers ───────────────────────────────────────────────────────────

        function epLabel(video) {
            return video.end_episode
                ? 'Episode ' + video.episode + '-' + video.end_episode
                : 'Episode ' + video.episode;
        }

        function needsCC() {
            return currentAnime && (currentAnime.marathon_video_id || currentAnime.use_cc);
        }

        // Initial embed URL — only used for the very first load.
        // autoplay=1, enablejsapi=1 always present.
        // CC flags appended if marathon or use_cc.
        function initialEmbedUrl(videoId, startSeconds) {
            let url = 'https://www.youtube.com/embed/' + videoId
                    + '?autoplay=1&rel=0&enablejsapi=1';
            if (startSeconds) url += '&start=' + Math.floor(startSeconds);
            if (needsCC())    url += '&cc_load_policy=1&cc_lang_pref=id';
            return url;
        }

        function getDisplayList() {
            const vids = currentAnime.videos.slice();
            if (sortOrder === 'desc') vids.reverse();
            return vids;
        }

        function getVideoByEp(epNum) {
            return currentAnime.videos.find(v => v.episode === epNum) || null;
        }

        function allEpNumbers() {
            return currentAnime.videos.map(v => v.episode).sort((a, b) => a - b);
        }

        function prevEpNumber() {
            const nums = allEpNumbers(), idx = nums.indexOf(currentEpNumber);
            return idx > 0 ? nums[idx - 1] : null;
        }

        function nextEpNumber() {
            const nums = allEpNumbers(), idx = nums.indexOf(currentEpNumber);
            return idx !== -1 && idx < nums.length - 1 ? nums[idx + 1] : null;
        }

        // ── Resolve start position ────────────────────────────────────────────
        // On the very first page load, check URL ?time= param then localStorage.
        // On episode switches, use video.start_seconds (chapter start) only.
        function resolveStartSecs(video) {
            let secs = video.start_seconds || 0;

            if (isInitialLoad) {
                isInitialLoad = false;
                const urlParams = new URLSearchParams(window.location.search);
                const timeParam = parseInt(urlParams.get('time') || '0');

                if (timeParam > 5) {
                    secs = timeParam;
                } else if (typeof BookmarkManager !== 'undefined') {
                    const saved = BookmarkManager.getAnimeData(currentAnime.name);
                    if (saved
                        && saved.lastWatchedEpisodeNumber === currentEpNumber
                        && saved.lastWatchedTime > 5) {
                        secs = saved.lastWatchedTime;
                    }
                }
            }
            return secs;
        }

        // ── Tracking helpers ─────────────────────────────────────────────────

        function startTracking() {
            if (typeof ContinueWatching === 'undefined' || !currentAnime) return;
            const video = getVideoByEp(currentEpNumber);
            if (!video) return;
            ContinueWatching.initPlayer(
                currentAnime.name, video.episode, epLabel(video), () => ytPlayer
            );
        }

        function stopTimeObserver() {
            if (_timeObserver) { clearInterval(_timeObserver); _timeObserver = null; }
        }

        // ── Unified Time-Range Observer ───────────────────────────────────────
        //
        // Replaces the old "near-end timer" with a single interval that handles
        // both marathon auto-transitions and end-of-episode save clearing.
        //
        // Every 3 s while watching, it evaluates the CURRENT episode's "border":
        //
        //  Case A — Marathon middle episode (next ep shares same video_id):
        //    • Border = nextEp.start_seconds
        //    • currentTime ≥ border   → marathonTransitionUI()  (no video reload)
        //    • border - currentTime < 60s → clear saved time (prevent mid-credits resume)
        //
        //  Case B — Last marathon episode OR non-marathon:
        //    • Border = getDuration()
        //    • getDuration() - currentTime < 60s → clear saved time, stop observer
        //
        function startTimeObserver() {
            stopTimeObserver();
            _timeObserver = setInterval(() => {
                if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
                const state = ytPlayer.getPlayerState();
                // Only act while playing (1) or just ended (0)
                if (state !== 1 && state !== 0) return;

                const t     = ytPlayer.getCurrentTime();
                const video = getVideoByEp(currentEpNumber);
                if (!video) return;

                const nextEpNum = nextEpNumber();

                if (nextEpNum !== null) {
                    const nextVid = getVideoByEp(nextEpNum);
                    const isMarathon = nextVid
                        && nextVid.video_id === video.video_id
                        && nextVid.start_seconds > 0;

                    if (isMarathon) {
                        if (t >= nextVid.start_seconds) {
                            // ── Auto-transition ───────────────────────────────
                            marathonTransitionUI(nextEpNum);
                            return; // observer restarts inside marathonTransitionUI
                        }
                        if ((nextVid.start_seconds - t) < 60) {
                            // Near border — clear saved time for this episode so
                            // a resume after closing doesn't land in the credits gap.
                            _clearSavedTime(video);
                        }
                        return;
                    }
                }

                // Case B: last marathon ep or non-marathon — use getDuration()
                const dur = (typeof ytPlayer.getDuration === 'function') ? ytPlayer.getDuration() : 0;
                if (dur > 0 && (dur - t) < 60) {
                    _clearSavedTime(video);
                    stopTimeObserver();
                }
            }, 3000);
        }

        function _clearSavedTime(video) {
            if (typeof BookmarkManager !== 'undefined' && currentAnime) {
                BookmarkManager.trackProgress(
                    currentAnime.name, video.video_id,
                    video.episode, epLabel(video),
                    null   // null = delete lastWatchedTime
                );
            }
        }

        // ── Marathon seamless UI transition ───────────────────────────────────
        //
        // Called when the playback position crosses a chapter border inside a
        // marathon video. The video keeps playing untouched — only the UI syncs.
        //
        //  1. Update currentEpNumber (guard against double-fire on next poll)
        //  2. Refresh info panel, prev/next buttons, sidebar highlight
        //  3. Save bookmark for the new episode (no timestamp = clean resume)
        //  4. Restart ContinueWatching tracking with new episode context
        //  5. Re-arm observer for the NEXT border
        //
        function marathonTransitionUI(nextEpNum) {
            if (typeof ContinueWatching !== 'undefined') ContinueWatching.stopPlayer();
            currentEpNumber = nextEpNum;          // update FIRST to guard re-entry

            const video = getVideoByEp(currentEpNumber);
            if (!video) return;

            // Sync info panel
            document.getElementById('currentTitle').textContent = currentAnime.name;
            document.getElementById('currentMeta').textContent =
                epLabel(video) + ' \u2022 ' +
                (currentAnime.name.includes('Dub Indo') ? 'Dub Indonesia' : 'Sub Indonesia');
            document.getElementById('prevBtn').disabled = prevEpNumber() === null;
            document.getElementById('nextBtn').disabled = nextEpNumber() === null;

            // Highlight new episode in sidebar (no page scroll — video is playing)
            renderEpisodeList();

            // Bookmark: record new episode, no timestamp (clean resume if reopened)
            if (typeof BookmarkManager !== 'undefined') {
                BookmarkManager.trackProgress(
                    currentAnime.name, video.video_id,
                    video.episode, epLabel(video)
                );
            }

            // Restart polling with new episode number/title
            startTracking();

            // Re-arm for the next chapter border (or last-episode end)
            startTimeObserver();

            console.log('[Marathon] \u2192 EP', nextEpNum, '|', epLabel(video));
        }

        // ── YT Player: switch episode without destroying the player ──────────
        //
        // Three strategies, chosen based on situation:
        //
        //   A) seekTo          — same video_id (always the case for marathon).
        //                        Instant; no network round-trip; no re-buffer.
        //
        //   B) loadVideoById   — different video_id (non-marathon episode switch).
        //                        Player stays alive, new video loads + autoplays.
        //                        onStateChange(1) fires → startTracking() called.
        //                        CC re-applied via setOption after load.
        //
        //   C) iframe src set  — only happens once, on the very first load,
        //                        before the YT.Player object exists.
        //
        function switchEpisodeInPlayer(video, startSecs) {
            if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') {
                // Player not ready yet — src is already being set by refreshAll
                return;
            }

            const isSameVideo = (loadedVideoId === video.video_id);

            if (isSameVideo) {
                // ── Strategy A: seekTo ────────────────────────────────────────
                // Marathon manual switch: user clicked prev/next/list.
                // Video keeps playing, we just seek to the chapter start.
                ytPlayer.seekTo(startSecs, true);
                ytPlayer.playVideo();
                startTracking();
                // onStateChange(PLAYING) may or may not re-fire after seekTo,
                // so explicitly re-arm the observer here.
                startTimeObserver();

            } else {
                // ── Strategy B: loadVideoById ─────────────────────────────────
                // Non-marathon: different video. Player reuses same iframe.
                ytPlayer.loadVideoById({ videoId: video.video_id, startSeconds: startSecs });
                loadedVideoId = video.video_id;

                // Re-apply CC for series that need it (undocumented but working)
                if (needsCC()) {
                    try {
                        ytPlayer.setOption('captions', 'track', { languageCode: 'id' });
                    } catch(e) {}
                }
                // Tracking will be restarted by onStateChange(1) firing when
                // the new video begins playing — no need to call startTracking() here.
            }
        }

        // ── Build UI ─────────────────────────────────────────────────────────

        function buildPlayerUI() {
            const urlParams = new URLSearchParams(window.location.search);
            const nums = allEpNumbers();
            const count = currentAnime.videos.length;

            if (count < 12) {
                currentEpNumber = nums[nums.length - 1];
                sortOrder = 'desc';
            } else {
                currentEpNumber = nums[0];
                sortOrder = 'asc';
            }

            const epParam = urlParams.get('episode');
            if (epParam) {
                const n = parseInt(epParam);
                if (nums.includes(n)) { currentEpNumber = n; sortOrder = 'asc'; }
            }

            document.getElementById('content').innerHTML =
                '<div class="player-section">' +
                  '<div>' +
                    '<div class="video-container">' +
                      '<div class="video-wrapper">' +
                        '<iframe id="videoPlayer" src="" frameborder="0" ' +
                        'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" ' +
                        'referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>' +
                      '</div>' +
                      '<div class="video-info">' +
                        '<div class="current-episode" id="currentTitle"></div>' +
                        '<div class="episode-meta" id="currentMeta"></div>' +
                      '</div>' +
                    '</div>' +
                    '<div class="navigation">' +
                      '<button class="nav-btn" id="prevBtn">&#8592; Episode Sebelumnya</button>' +
                      '<button class="nav-btn" id="nextBtn">Episode Selanjutnya &#8594;</button>' +
                    '</div>' +
                  '</div>' +
                  '<div class="episodes-sidebar">' +
                    '<div class="sidebar-header">' +
                      '<div class="sidebar-title">Daftar Episode</div>' +
                      '<div class="sort-toggle">' +
                        '<button class="sort-btn" id="sortToggle">Terbaru</button>' +
                      '</div>' +
                    '</div>' +
                    '<div class="episodes-list" id="episodesList"></div>' +
                  '</div>' +
                '</div>';

            document.getElementById('prevBtn').addEventListener('click', () => {
                const p = prevEpNumber(); if (p !== null) playEpisode(p);
            });
            document.getElementById('nextBtn').addEventListener('click', () => {
                const n = nextEpNumber(); if (n !== null) playEpisode(n);
            });
            document.getElementById('sortToggle').addEventListener('click', () =>
                setSort(sortOrder === 'asc' ? 'desc' : 'asc')
            );

            refreshAll();
        }

        function setSort(order) {
            if (sortOrder === order) return;
            sortOrder = order;
            renderEpisodeList();
            updateSortButtons();
        }

        // ── playEpisode: switch episode ───────────────────────────────────────
        // Note: we do NOT null ytPlayer here — we want to keep it alive!
        function playEpisode(epNum) {
            if (typeof ContinueWatching !== 'undefined') ContinueWatching.stopPlayer();
            stopTimeObserver();
            currentEpNumber = epNum;
            refreshAll();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ── refreshAll: update UI + video ─────────────────────────────────────
        function refreshAll() {
            const video = getVideoByEp(currentEpNumber);
            if (!video) return;

            const startSecs = resolveStartSecs(video);

            // Update info panel
            document.getElementById('currentTitle').textContent = currentAnime.name;
            document.getElementById('currentMeta').textContent =
                epLabel(video) + ' \u2022 ' +
                (currentAnime.name.includes('Dub Indo') ? 'Dub Indonesia' : 'Sub Indonesia');

            document.getElementById('prevBtn').disabled = prevEpNumber() === null;
            document.getElementById('nextBtn').disabled = nextEpNumber() === null;

            renderEpisodeList();
            updateSortButtons();

            // Bookmark: record episode open (time saved separately by polling)
            if (typeof BookmarkManager !== 'undefined') {
                BookmarkManager.trackProgress(
                    currentAnime.name, video.video_id, video.episode, epLabel(video)
                );
            }

            if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
                // ── Player already exists → use API (no src change) ───────────
                switchEpisodeInPlayer(video, startSecs);
            } else {
                // ── First load → set src, then YT API will wrap it ────────────
                document.getElementById('videoPlayer').src =
                    initialEmbedUrl(video.video_id, startSecs);
                loadedVideoId = video.video_id;
                // attachYTPlayer will be called once onYouTubeIframeAPIReady fires
                // (or immediately if the API script already loaded)
                setTimeout(attachYTPlayer, 1200);
            }
        }

        function renderEpisodeList() {
            const list = document.getElementById('episodesList');
            list.innerHTML = '';
            getDisplayList().forEach(video => {
                const item = document.createElement('div');
                item.className = 'episode-item' + (video.episode === currentEpNumber ? ' active' : '');
                const label = video.chapter_title || epLabel(video);
                item.innerHTML =
                    '<div class="ep-num">EP ' + video.episode + '</div>' +
                    '<div class="ep-title">' + label + '</div>';
                item.addEventListener('click', () => playEpisode(video.episode));
                list.appendChild(item);
            });
            const active = list.querySelector('.episode-item.active');
            if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function updateSortButtons() {
            document.getElementById('sortToggle').classList.toggle('active', sortOrder === 'desc');
        }

        // ── YT IFrame API ─────────────────────────────────────────────────────

        window.onYouTubeIframeAPIReady = function() {
            ytApiReady = true;
            attachYTPlayer();
        };

        function attachYTPlayer() {
            // Guard: only create once; skip if API not ready or player exists
            if (!ytApiReady || ytPlayer) return;
            const iframe = document.getElementById('videoPlayer');
            if (!iframe) return;

            ytPlayer = new YT.Player('videoPlayer', {
                events: {
                    'onReady': () => {
                        startTracking();
                        startTimeObserver();
                    },

                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.PLAYING) {
                            startTracking();
                            startTimeObserver();
                        }
                        if (e.data === YT.PlayerState.ENDED) {
                            stopTimeObserver();
                            if (typeof BookmarkManager !== 'undefined' && currentAnime) {
                                const video = getVideoByEp(currentEpNumber);
                                if (video) _clearSavedTime(video);
                            }
                        }
                    }
                }
            });
        }

        // ── Load data ─────────────────────────────────────────────────────────

        async function loadAnimeData() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const animeName = urlParams.get('anime');
                if (!animeName) throw new Error('No anime specified');

                let data = null;
                try {
                    const raw = localStorage.getItem('anime_data');
                    if (raw) data = JSON.parse(raw);
                } catch(e) {}
                if (!data || !data.anime_list) {
                    const res = await fetch('anime_data.json');
                    data = await res.json();
                }

                currentAnime = data.anime_list.find(a => a.name === animeName);
                if (!currentAnime) throw new Error('Anime not found');

                document.title = currentAnime.name + ' - Anime Player';
                document.getElementById('animeTitle').textContent = currentAnime.name;
                buildPlayerUI();
            } catch(e) {
                document.getElementById('content').innerHTML =
                    '<div class="loading">&#10060; ' + e.message + '<br><br>' +
                    '<a href="index.html" style="color:#667eea">&#8592; Kembali ke Beranda</a></div>';
            }
        }

        loadAnimeData();
    </script>
    <script src="https://www.youtube.com/iframe_api" async></script>
</body>
</html>
